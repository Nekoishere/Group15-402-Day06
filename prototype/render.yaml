services:
  - type: web
    name: vinlex-chatbot
    runtime: python
    rootDir: prototype
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 120
    disk:
      name: chroma-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
